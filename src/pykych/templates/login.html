{% extends "base.html" %}

{% block extra_head %}
<style>
    .login-container {
        max-width: 400px;
        margin: 3rem auto;
    }
    .login-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 2rem 2.25rem;
        box-shadow: var(--shadow-md);
    }
    .login-card h1 {
        font-size: 1.4rem;
        text-align: center;
        margin-bottom: 0.25rem;
    }
    .login-card .subtitle {
        text-align: center;
        color: var(--text-muted);
        font-size: 0.9rem;
        margin-bottom: 1.5rem;
    }
    .form-group {
        margin-bottom: 1rem;
    }
    .form-group label {
        display: block;
        font-weight: 600;
        font-size: 0.85rem;
        margin-bottom: 0.3rem;
    }
    .form-input {
        width: 100%;
        padding: 0.6rem 0.85rem;
        border: 1px solid var(--border);
        border-radius: 6px;
        font-size: 0.95rem;
        font-family: inherit;
        background: var(--bg);
        transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
    }
    .btn-login {
        width: 100%;
        padding: 0.65rem;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        margin-top: 0.5rem;
        transition: background 0.2s;
    }
    .btn-login:hover {
        background: var(--accent-hover);
    }
    .error-msg {
        background: #fef2f2;
        border: 1px solid #fecaca;
        color: #dc2626;
        padding: 0.65rem 0.9rem;
        border-radius: 6px;
        margin-bottom: 1rem;
        font-size: 0.88rem;
        text-align: center;
    }
    .login-footer {
        text-align: center;
        margin-top: 1rem;
        color: var(--text-muted);
        font-size: 0.85rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card">
        <h1>🔐 管理员登录</h1>
        <p class="subtitle">跨越晨昏 后台管理系统</p>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/auth/login">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username"
                       class="form-input" placeholder="输入用户名"
                       required autofocus>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password"
                       class="form-input" placeholder="输入密码"
                       required>
            </div>
            <button type="submit" class="btn-login">登 录</button>
        </form>
    </div>
    <p class="login-footer">用户由管理员添加，不支持自行注册</p>
</div>
{% endblock %}
