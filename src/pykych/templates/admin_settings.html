{% extends "base.html" %}

{% block extra_head %}
<style>
    .wp-admin-wrap { max-width: 800px; margin: 0 auto; }
    .wp-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; }
    .wp-card h2 { font-size: 1.1rem; margin: 0 0 1rem 0; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
    .wp-form-group { margin-bottom: 1rem; }
    .wp-form-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--text); }
    .wp-form-group input, .wp-form-group textarea, .wp-form-group select {
        width: 100%; padding: 0.5rem 0.65rem; border: 1px solid var(--border); border-radius: 6px;
        font-size: 0.9rem; font-family: inherit; background: var(--bg); color: var(--text);
        transition: border-color 0.2s, box-shadow 0.2s;
    }
    .wp-form-group input:focus, .wp-form-group textarea:focus, .wp-form-group select:focus {
        outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }
    .wp-form-group .hint { font-size: 0.78rem; color: var(--text-muted); margin-top: 0.25rem; }
    .wp-form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 600px) { .wp-form-row { grid-template-columns: 1fr; } }
    .wp-checkbox-group { display: flex; align-items: center; gap: 0.5rem; }
    .wp-checkbox-group input[type="checkbox"] { width: auto; }
    .wp-submit-bar { display: flex; gap: 0.75rem; align-items: center; padding-top: 0.5rem; }
    .wp-btn-primary { background: var(--accent); color: #fff; border: none; padding: 0.6rem 1.5rem; border-radius: 6px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .wp-btn-primary:hover { background: var(--accent-hover); }
    .wp-btn-secondary { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); padding: 0.6rem 1.5rem; border-radius: 6px; font-size: 0.9rem; cursor: pointer; transition: all 0.2s; text-decoration: none; }
    .wp-btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .wp-back-link { display: inline-flex; align-items: center; gap: 0.25rem; color: var(--text-muted); font-size: 0.85rem; text-decoration: none; margin-bottom: 1.5rem; }
    .wp-back-link:hover { color: var(--accent); }
</style>
{% endblock %}

{% block content %}
<div class="wp-admin-wrap">
    <a href="/admin" class="wp-back-link">← 返回管理后台</a>
    <h1 style="font-size:1.5rem;margin-bottom:1.5rem;">⚙️ 站点设置</h1>

    <form method="POST" action="/admin/settings/update">
    <!-- 站点信息 -->
    <div class="wp-card">
        <h2>🏠 站点信息</h2>
        <div class="wp-form-group">
            <label>网站标题</label>
            <input type="text" name="site_title" value="{{ settings.site.title|default('')|e }}">
        </div>
        <div class="wp-form-group">
            <label>副标题</label>
            <input type="text" name="site_subtitle" value="{{ settings.site.subtitle|default('')|e }}">
        </div>
        <div class="wp-form-group">
            <label>网站描述</label>
            <textarea name="site_description" rows="2">{{ settings.site.description|default('')|e }}</textarea>
            <span class="hint">用于 SEO 和社交媒体分享。</span>
        </div>
        <div class="wp-form-row">
            <div class="wp-form-group">
                <label>Logo 路径</label>
                <input type="text" name="site_logo_path" value="{{ settings.site.logo_path|default('/static/img/logo.png')|e }}">
            </div>
            <div class="wp-form-group">
                <label>ICP 备案号</label>
                <input type="text" name="site_icp" value="{{ settings.site.icp_number|default('')|e }}">
            </div>
        </div>
    </div>

    <!-- 外观设置 -->
    <div class="wp-card">
        <h2>🎨 外观</h2>
        <div class="wp-form-row">
            <div class="wp-form-group">
                <label>默认主题</label>
                <select name="theme">
                    <option value="auto" {% if settings.appearance.theme|default('auto') == 'auto' %}selected{% endif %}>跟随系统</option>
                    <option value="light" {% if settings.appearance.theme|default('auto') == 'light' %}selected{% endif %}>浅色模式</option>
                    <option value="dark" {% if settings.appearance.theme|default('auto') == 'dark' %}selected{% endif %}>深色模式</option>
                </select>
            </div>
            <div class="wp-form-group">
                <label>主题色</label>
                <input type="color" name="primary_color" value="{{ settings.appearance.primary_color|default('#3b82f6')|e }}" style="height:38px;padding:2px;">
            </div>
        </div>
    </div>

    <!-- 功能设置 -->
    <div class="wp-card">
        <h2>🔧 功能开关</h2>
        <div class="wp-form-row">
            <div class="wp-checkbox-group">
                <input type="checkbox" name="enable_comments" value="1" id="ec" {% if settings.features.enable_comments|default(true) %}checked{% endif %}>
                <label for="ec" style="margin:0;">启用评论区</label>
            </div>
            <div class="wp-checkbox-group">
                <input type="checkbox" name="enable_search" value="1" id="es" {% if settings.features.enable_search|default(true) %}checked{% endif %}>
                <label for="es" style="margin:0;">启用搜索</label>
            </div>
            <div class="wp-checkbox-group">
                <input type="checkbox" name="enable_dark_mode" value="1" id="ed" {% if settings.features.enable_dark_mode|default(true) %}checked{% endif %}>
                <label for="ed" style="margin:0;">启用深色模式</label>
            </div>
        </div>
        <div class="wp-form-group" style="margin-top:0.75rem;">
            <label>每页文章数</label>
            <input type="number" name="posts_per_page" value="{{ settings.features.posts_per_page|default(10) }}" min="1" max="50" style="max-width:100px;">
        </div>
    </div>

    <!-- 社交链接 -->
    <div class="wp-card">
        <h2>🔗 社交链接</h2>
        <div class="wp-form-group">
            <label>GitHub</label>
            <input type="text" name="github" value="{{ settings.social.github|default('')|e }}" placeholder="https://github.com/username">
        </div>
        <div class="wp-form-group">
            <label>Twitter / X</label>
            <input type="text" name="twitter" value="{{ settings.social.twitter|default('')|e }}" placeholder="https://twitter.com/username">
        </div>
        <div class="wp-form-group">
            <label>邮箱</label>
            <input type="email" name="email" value="{{ settings.social.email|default('')|e }}" placeholder="hello@example.com">
        </div>
    </div>

    <div class="wp-submit-bar">
        <button type="submit" class="wp-btn-primary">💾 保存设置</button>
        <a href="/admin" class="wp-btn-secondary">取消</a>
    </div>
    </form>
</div>
{% endblock %}
