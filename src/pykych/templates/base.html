<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title | default('跨越晨昏') }}</title>
    <!-- 黑暗模式防闪烁脚本：必须在 <body> 渲染前执行 -->
    <script>
        (function() {
            const saved = localStorage.getItem('theme');
            if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
    <style>
        /* ===== CSS Reset & Base ===== */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #ffffff;
            --bg-card: #ffffff;
            --text: #1a1a1a;
            --text-secondary: #555555;
            --text-muted: #999999;
            --border: #e5e5e5;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --code-bg: #f5f5f5;
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.05), 0 2px 4px rgba(0, 0, 0, 0.04);
            --radius: 8px;
            --max-width: 720px;
            --header-bg: rgba(255, 255, 255, 0.92);
        }

        /* ── 黑暗模式 ── */
        [data-theme="dark"] {
            --bg: #000000;
            --bg-card: #111111;
            --text: #e0e0e0;
            --text-secondary: #999999;
            --text-muted: #666666;
            --border: #2a2a2a;
            --accent: #60a5fa;
            --accent-hover: #93bcf8;
            --code-bg: #1a1a1a;
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.5), 0 1px 2px rgba(0, 0, 0, 0.4);
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.6), 0 2px 4px rgba(0, 0, 0, 0.5);
            --header-bg: rgba(0, 0, 0, 0.92);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* ===== Header ===== */
        header {
            background: var(--header-bg);
            border-bottom: 1px solid var(--border);
            padding: 1.2rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
            transition: background 0.3s ease;
        }

        .header-inner {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            font-size: 1rem;
        }

        nav {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        nav a:hover {
            color: var(--accent);
        }

        /* ===== Sidebar Toggle Button ===== */
        .sidebar-toggle {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--text-secondary);
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            transition: background 0.2s, color 0.2s;
            line-height: 1;
        }
        .sidebar-toggle:hover {
            background: var(--code-bg);
            color: var(--accent);
        }

        /* ===== Theme Toggle Button ===== */
        .theme-toggle {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            transition: background 0.2s, transform 0.3s;
            line-height: 1;
        }
        .theme-toggle:hover {
            background: var(--code-bg);
            transform: rotate(15deg);
        }
        .theme-icon {
            display: inline-block;
            transition: transform 0.3s ease;
        }

        /* ===== Search Form ===== */
        .search-form {
            margin-bottom: 1.5rem;
        }
        .search-input-wrapper {
            display: flex;
            gap: 0.5rem;
        }
        .search-input {
            flex: 1;
            padding: 0.7rem 1rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg-card);
            color: var(--text);
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }
        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        .search-input::placeholder {
            color: var(--text-muted);
        }
        .search-btn {
            padding: 0.7rem 1.5rem;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .search-btn:hover {
            background: var(--accent-hover);
        }
        .search-info {
            margin-bottom: 1rem;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }
        .search-info strong {
            color: var(--accent);
        }

        /* ===== Pagination ===== */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
        }
        .page-btn {
            display: inline-block;
            padding: 0.4rem 1rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--accent);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        .page-btn:hover {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            text-decoration: none;
        }
        .page-info {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* ===== Sidebar ===== */
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 200;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .sidebar-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        .sidebar {
            position: fixed;
            top: 0;
            right: -300px;
            width: 280px;
            height: 100%;
            background: var(--bg-card);
            box-shadow: -2px 0 12px rgba(0, 0, 0, 0.08);
            z-index: 201;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .sidebar.open {
            right: 0;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .sidebar-header h3 {
            margin: 0;
            font-size: 1.1rem;
        }
        .sidebar-close {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.3rem;
            color: var(--text-muted);
            padding: 0.25rem;
            line-height: 1;
            border-radius: 4px;
            transition: color 0.2s, background 0.2s;
        }
        .sidebar-close:hover {
            color: var(--text);
            background: var(--code-bg);
        }

        .sidebar-body {
            padding: 1rem 1.5rem;
            flex: 1;
            overflow-y: auto;
        }
        .sidebar-tag {
            display: block;
            padding: 0.45rem 0.75rem;
            border-radius: 6px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.92rem;
            transition: background 0.15s, color 0.15s;
            margin-bottom: 0.15rem;
        }
        .sidebar-tag:hover {
            background: var(--code-bg);
            color: var(--accent);
            text-decoration: none;
        }
        .sidebar-tag .count {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-left: 0.35rem;
        }
        .sidebar-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        .sidebar-footer a {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-decoration: none;
            transition: color 0.2s;
        }
        .sidebar-footer a:hover {
            color: var(--accent);
        }

        /* ===== Tag Cloud ===== */
        .tag-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin-top: 1rem;
        }
        .tag-item {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.4rem 0.85rem;
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: 2rem;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .tag-item:hover {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            text-decoration: none;
        }
        .tag-item .tag-count {
            font-size: 0.75rem;
            opacity: 0.7;
            background: rgba(0,0,0,0.06);
            padding: 0.1rem 0.45rem;
            border-radius: 1rem;
        }
        .tag-item:hover .tag-count {
            background: rgba(255,255,255,0.2);
        }

        /* ===== Article Type Badge ===== */
        .article-type-badge {
            display: inline-block;
            font-size: 0.75rem;
            padding: 0.1rem 0.5rem;
            border-radius: 4px;
            background: var(--code-bg);
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.05em;
            margin-right: 0.4rem;
        }

        /* ===== Inline Tags ===== */
        .inline-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
            margin-top: 0.5rem;
        }
        .inline-tag {
            display: inline-block;
            padding: 0.15rem 0.55rem;
            font-size: 0.78rem;
            border-radius: 1rem;
            background: var(--code-bg);
            color: var(--text-muted);
            text-decoration: none;
            transition: all 0.15s;
        }
        .inline-tag:hover {
            background: var(--accent);
            color: #fff;
            text-decoration: none;
        }

        /* ===== Main Content ===== */
        main {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
        }

        /* ===== Footer ===== */
        footer {
            text-align: center;
            padding: 2rem 1.5rem;
            color: var(--text-muted);
            font-size: 0.875rem;
            border-top: 1px solid var(--border);
            max-width: var(--max-width);
            margin: 0 auto;
        }

        /* ===== Card ===== */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem 1.75rem;
            box-shadow: var(--shadow);
            transition: box-shadow 0.2s ease, transform 0.2s ease;
        }

        .card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }

        /* ===== Typography ===== */
        h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.3;
            margin-bottom: 0.5rem;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-top: 2rem;
            margin-bottom: 0.75rem;
            letter-spacing: -0.02em;
        }

        h3 {
            font-size: 1.15rem;
            font-weight: 600;
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
        }

        p {
            margin-bottom: 1rem;
        }

        a {
            color: var(--accent);
            text-decoration: none;
        }

        a:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }

        ul, ol {
            margin-bottom: 1rem;
            padding-left: 1.5rem;
        }

        li {
            margin-bottom: 0.4rem;
        }

        strong {
            font-weight: 600;
        }

        pre {
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem 1.25rem;
            overflow-x: auto;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            line-height: 1.6;
        }

        code {
            font-family: "SF Mono", "Fira Code", "Fira Mono", "Cascadia Code", monospace;
            font-size: 0.875rem;
            background: var(--code-bg);
            padding: 0.15em 0.35em;
            border-radius: 4px;
        }

        pre code {
            background: none;
            padding: 0;
            border-radius: 0;
        }

        /* ===== Article List ===== */
        .article-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .article-card {
            display: block;
            text-decoration: none;
            color: inherit;
        }

        .article-card h3 {
            margin-top: 0;
            margin-bottom: 0.25rem;
            color: var(--text);
            font-size: 1.15rem;
        }

        .article-card .date {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .article-card .summary {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.7;
        }

        .read-more {
            display: inline-block;
            margin-top: 0.5rem;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--accent);
        }

        .article-card:hover .read-more {
            text-decoration: underline;
        }

        /* ===== Page Content ===== */
        .page-header {
            margin-bottom: 2rem;
        }

        .page-header .subtitle {
            color: var(--text-secondary);
            font-size: 1.05rem;
            margin-top: 0.25rem;
        }

        .content-body {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem 2.25rem;
            box-shadow: var(--shadow);
            font-size: 1rem;
            line-height: 1.85;
        }

        .content-body h2:first-child {
            margin-top: 0;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 500;
            text-decoration: none;
            margin-top: 1.5rem;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: var(--accent);
            text-decoration: none;
        }

        .content-date {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        /* ===== Hero Section ===== */
        .hero {
            text-align: center;
            padding: 2rem 0 1rem;
        }

        .hero h1 {
            font-size: 2.25rem;
        }

        .hero .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-top: 0.5rem;
        }

        /* ===== User Avatar & Dropdown ===== */
        .user-avatar-wrap {
            position: relative;
            display: none;  /* 默认隐藏，JS 检测后显示 */
        }
        .user-avatar-wrap.visible {
            display: block;
        }

        .user-avatar-btn {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.15rem;
            border-radius: 2rem;
            transition: background 0.2s;
        }
        .user-avatar-btn:hover {
            background: var(--code-bg);
        }

        .user-avatar-img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--border);
            transition: border-color 0.2s;
        }
        .user-avatar-btn:hover .user-avatar-img {
            border-color: var(--accent);
        }

        .user-avatar-fallback {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
            border: 2px solid var(--border);
        }

        .user-avatar-arrow {
            font-size: 0.6rem;
            color: var(--text-muted);
            transition: transform 0.2s;
        }
        .user-avatar-wrap.open .user-avatar-arrow {
            transform: rotate(180deg);
        }

        .user-dropdown {
            display: none;
            position: absolute;
            right: 0;
            top: calc(100% + 8px);
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            min-width: 160px;
            z-index: 150;
            overflow: hidden;
        }
        .user-avatar-wrap.open .user-dropdown {
            display: block;
        }

        .user-dropdown a,
        .user-dropdown button {
            display: block;
            width: 100%;
            text-align: left;
            padding: 0.65rem 1rem;
            font-size: 0.9rem;
            color: var(--text);
            text-decoration: none;
            background: none;
            border: none;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.15s;
        }
        .user-dropdown a:hover,
        .user-dropdown button:hover {
            background: var(--code-bg);
            color: var(--accent);
            text-decoration: none;
        }
        .user-dropdown .user-dropdown-name {
            padding: 0.65rem 1rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
            font-weight: 500;
        }
        .user-dropdown .user-dropdown-role {
            font-size: 0.7rem;
            color: var(--text-muted);
            padding: 0.1rem 0.5rem;
            border-radius: 1rem;
            background: var(--code-bg);
            margin-left: 0.3rem;
        }

        /* 登录链接（未登录时显示） */
        .nav-login-link {
            display: none;
        }
        .nav-login-link.visible {
            display: inline;
        }

        /* ===== Responsive ===== */
        @media (max-width: 640px) {
            .header-inner {
                padding: 0 1rem;
            }

            main {
                padding: 1.5rem 1rem 3rem;
            }

            h1 {
                font-size: 1.6rem;
            }

            .content-body {
                padding: 1.25rem 1.25rem;
            }

            .hero h1 {
                font-size: 1.75rem;
            }
        }
    </style>
    <!-- 主题 CSS（覆盖默认变量） -->
    <link rel="stylesheet" href="/theme.css">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header>
        <div class="header-inner">
            <a href="/" class="logo">
                <span class="logo-icon">跨</span>
            </a>
            <nav>
                <a href="/search" title="搜索" aria-label="搜索">🔍</a>
                <button class="theme-toggle" onclick="toggleTheme()" title="切换黑暗/明亮模式" aria-label="切换主题">
                    <span class="theme-icon" id="themeIcon">🌙</span>
                </button>
                <button class="sidebar-toggle" onclick="toggleSidebar()" title="标签" aria-label="打开标签侧栏">🏷️</button>
                <!-- 未登录时显示的登录链接 -->
                <a href="/auth/login" class="nav-login-link" id="navLoginLink">登录</a>
                <!-- 用户头像区域 -->
                <div class="user-avatar-wrap" id="userAvatarWrap">
                    <button class="user-avatar-btn" onclick="toggleUserDropdown(event)" title="用户菜单" aria-label="用户菜单">
                        <span id="userAvatarContent"></span>
                        <span class="user-avatar-arrow">▼</span>
                    </button>
                    <div class="user-dropdown" id="userDropdown">
                        <div class="user-dropdown-name" id="userDropdownName"></div>
                        <a href="/admin/profile">👤 个人资料</a>
                        <a href="/admin" style="color: var(--accent);">⚙️ 管理后台</a>
                        <a href="/auth/logout">🚪 退出登录</a>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <!-- 侧栏遮罩 -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <!-- 侧栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3>🏷️ 标签</h3>
            <button class="sidebar-close" onclick="toggleSidebar()" aria-label="关闭侧栏">✕</button>
        </div>
        <div class="sidebar-body" id="sidebarTags">
            <p style="color: var(--text-muted); font-size: 0.9rem;">加载中...</p>
        </div>
        <div class="sidebar-footer">
            <a href="/labels">查看所有标签 →</a>
        </div>
    </aside>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 跨越晨昏 · 使用 <a href="https://lihil.cc" target="_blank">LiHiL</a> 构建</p>
        <p><a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer" style="color: var(--text-muted); text-decoration: none; font-size: 0.85rem;">京ICP备2026033372号</a></p>
    </footer>

    {% block extra_scripts %}{% endblock %}
    <script>
        // ── 主题切换 ──
        function getTheme() {
            return document.documentElement.getAttribute('data-theme') || 'light';
        }

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            updateThemeIcon(theme);
        }

        function updateThemeIcon(theme) {
            const icon = document.getElementById('themeIcon');
            if (icon) {
                icon.textContent = theme === 'dark' ? '☀️' : '🌙';
            }
        }

        function toggleTheme() {
            const current = getTheme();
            setTheme(current === 'dark' ? 'light' : 'dark');
        }

        // 初始化图标（页面加载时）
        document.addEventListener('DOMContentLoaded', function() {
            updateThemeIcon(getTheme());
        });

        // 监听系统主题变化（当用户未手动设置时自动切换）
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
            if (!localStorage.getItem('theme')) {
                setTheme(e.matches ? 'dark' : 'light');
            }
        });

        // ── 侧栏控制 ──
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const isOpen = sidebar.classList.contains('open');
            if (isOpen) {
                sidebar.classList.remove('open');
                overlay.classList.remove('open');
            } else {
                sidebar.classList.add('open');
                overlay.classList.add('open');
                loadSidebarTags();
            }
        }

        async function loadSidebarTags() {
            const container = document.getElementById('sidebarTags');
            if (container.dataset.loaded === 'true') return;
            try {
                const resp = await fetch('/labels');
                const text = await resp.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(text, 'text/html');
                const tagLinks = doc.querySelectorAll('.tag-item');
                let html = '';
                tagLinks.forEach(link => {
                    const name = link.querySelector('.tag-name').textContent;
                    const count = link.querySelector('.tag-count').textContent;
                    html += `<a href="${link.href}" class="sidebar-tag">${name}<span class="count">(${count})</span></a>`;
                });
                if (!html) {
                    html = '<p style="color: var(--text-muted); font-size: 0.9rem;">暂无标签</p>';
                }
                container.innerHTML = html;
                container.dataset.loaded = 'true';
            } catch (e) {
                container.innerHTML = '<p style="color: var(--text-muted); font-size: 0.9rem;">加载失败</p>';
            }
        }

        // ── 用户头像 & 下拉菜单 ──
        function toggleUserDropdown(event) {
            event.stopPropagation();
            const wrap = document.getElementById('userAvatarWrap');
            wrap.classList.toggle('open');
        }

        // 点击页面其他地方关闭下拉菜单
        document.addEventListener('click', function(event) {
            const wrap = document.getElementById('userAvatarWrap');
            if (wrap && wrap.classList.contains('open')) {
                if (!wrap.contains(event.target)) {
                    wrap.classList.remove('open');
                }
            }
        });

        async function initUserAvatar() {
            try {
                const resp = await fetch('/api/me');
                const data = await resp.json();
                const wrap = document.getElementById('userAvatarWrap');
                const loginLink = document.getElementById('navLoginLink');
                const avatarContent = document.getElementById('userAvatarContent');
                const dropdownName = document.getElementById('userDropdownName');

                if (data.user) {
                    // 已登录：显示头像
                    const u = data.user;
                    wrap.classList.add('visible');
                    if (loginLink) loginLink.classList.remove('visible');

                    // 设置头像内容
                    const initial = (u.nickname || u.username).charAt(0).toUpperCase();
                    if (u.avatar && u.avatar !== '/static/img/default-avatar.png') {
                        avatarContent.innerHTML = `<img src="${u.avatar}" alt="${u.nickname}" class="user-avatar-img" onerror="this.style.display='none';var fb=document.getElementById('avatarFallback');if(fb)fb.style.display='flex';">`;
                        // 预置 fallback（隐藏状态，图片加载失败时显示）
                        const fb = document.createElement('span');
                        fb.id = 'avatarFallback';
                        fb.className = 'user-avatar-fallback';
                        fb.textContent = initial;
                        fb.style.display = 'none';
                        avatarContent.appendChild(fb);
                    } else {
                        // 使用昵称首字作为头像
                        avatarContent.innerHTML = `<span class="user-avatar-fallback">${initial}</span>`;
                    }

                    // 设置下拉菜单名称
                    const roleLabel = u.role === 'owner' ? '站长' : (u.role === 'admin' ? '管理员' : '用户');
                    dropdownName.innerHTML = `${u.nickname || u.username} <span class="user-dropdown-role">${roleLabel}</span>`;
                } else {
                    // 未登录：显示登录链接
                    if (loginLink) loginLink.classList.add('visible');
                }
            } catch (e) {
                // 网络错误时显示登录链接
                const loginLink = document.getElementById('navLoginLink');
                if (loginLink) loginLink.classList.add('visible');
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            initUserAvatar();
        });
    </script>
</body>
</html>
