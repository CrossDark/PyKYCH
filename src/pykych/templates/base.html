<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title | default('跨越晨昏') }}</title>
    <style>
        /* ===== CSS Reset & Base ===== */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #fdfcf9;
            --bg-card: #ffffff;
            --text: #2c2c2c;
            --text-secondary: #6b6b6b;
            --text-muted: #999;
            --border: #e8e5df;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --code-bg: #f5f4f0;
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.05), 0 2px 4px rgba(0, 0, 0, 0.04);
            --radius: 8px;
            --max-width: 720px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ===== Header ===== */
        header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 1.2rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
            background: rgba(253, 252, 249, 0.92);
        }

        .header-inner {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            font-size: 1rem;
        }

        nav {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        nav a:hover {
            color: var(--accent);
        }

        /* ===== Sidebar Toggle Button ===== */
        .sidebar-toggle {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--text-secondary);
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            transition: background 0.2s, color 0.2s;
            line-height: 1;
        }
        .sidebar-toggle:hover {
            background: var(--code-bg);
            color: var(--accent);
        }

        /* ===== Sidebar ===== */
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 200;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .sidebar-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        .sidebar {
            position: fixed;
            top: 0;
            right: -300px;
            width: 280px;
            height: 100%;
            background: var(--bg-card);
            box-shadow: -2px 0 12px rgba(0, 0, 0, 0.08);
            z-index: 201;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .sidebar.open {
            right: 0;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .sidebar-header h3 {
            margin: 0;
            font-size: 1.1rem;
        }
        .sidebar-close {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.3rem;
            color: var(--text-muted);
            padding: 0.25rem;
            line-height: 1;
            border-radius: 4px;
            transition: color 0.2s, background 0.2s;
        }
        .sidebar-close:hover {
            color: var(--text);
            background: var(--code-bg);
        }

        .sidebar-body {
            padding: 1rem 1.5rem;
            flex: 1;
            overflow-y: auto;
        }
        .sidebar-tag {
            display: block;
            padding: 0.45rem 0.75rem;
            border-radius: 6px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.92rem;
            transition: background 0.15s, color 0.15s;
            margin-bottom: 0.15rem;
        }
        .sidebar-tag:hover {
            background: var(--code-bg);
            color: var(--accent);
            text-decoration: none;
        }
        .sidebar-tag .count {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-left: 0.35rem;
        }
        .sidebar-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        .sidebar-footer a {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-decoration: none;
            transition: color 0.2s;
        }
        .sidebar-footer a:hover {
            color: var(--accent);
        }

        /* ===== Tag Cloud ===== */
        .tag-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin-top: 1rem;
        }
        .tag-item {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.4rem 0.85rem;
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: 2rem;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .tag-item:hover {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            text-decoration: none;
        }
        .tag-item .tag-count {
            font-size: 0.75rem;
            opacity: 0.7;
            background: rgba(0,0,0,0.06);
            padding: 0.1rem 0.45rem;
            border-radius: 1rem;
        }
        .tag-item:hover .tag-count {
            background: rgba(255,255,255,0.2);
        }

        /* ===== Article Type Badge ===== */
        .article-type-badge {
            display: inline-block;
            font-size: 0.75rem;
            padding: 0.1rem 0.5rem;
            border-radius: 4px;
            background: var(--code-bg);
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.05em;
            margin-right: 0.4rem;
        }

        /* ===== Inline Tags ===== */
        .inline-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
            margin-top: 0.5rem;
        }
        .inline-tag {
            display: inline-block;
            padding: 0.15rem 0.55rem;
            font-size: 0.78rem;
            border-radius: 1rem;
            background: var(--code-bg);
            color: var(--text-muted);
            text-decoration: none;
            transition: all 0.15s;
        }
        .inline-tag:hover {
            background: var(--accent);
            color: #fff;
            text-decoration: none;
        }

        /* ===== Main Content ===== */
        main {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
        }

        /* ===== Footer ===== */
        footer {
            text-align: center;
            padding: 2rem 1.5rem;
            color: var(--text-muted);
            font-size: 0.875rem;
            border-top: 1px solid var(--border);
            max-width: var(--max-width);
            margin: 0 auto;
        }

        /* ===== Card ===== */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem 1.75rem;
            box-shadow: var(--shadow);
            transition: box-shadow 0.2s ease, transform 0.2s ease;
        }

        .card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }

        /* ===== Typography ===== */
        h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.3;
            margin-bottom: 0.5rem;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-top: 2rem;
            margin-bottom: 0.75rem;
            letter-spacing: -0.02em;
        }

        h3 {
            font-size: 1.15rem;
            font-weight: 600;
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
        }

        p {
            margin-bottom: 1rem;
        }

        a {
            color: var(--accent);
            text-decoration: none;
        }

        a:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }

        ul, ol {
            margin-bottom: 1rem;
            padding-left: 1.5rem;
        }

        li {
            margin-bottom: 0.4rem;
        }

        strong {
            font-weight: 600;
        }

        pre {
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem 1.25rem;
            overflow-x: auto;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            line-height: 1.6;
        }

        code {
            font-family: "SF Mono", "Fira Code", "Fira Mono", "Cascadia Code", monospace;
            font-size: 0.875rem;
            background: var(--code-bg);
            padding: 0.15em 0.35em;
            border-radius: 4px;
        }

        pre code {
            background: none;
            padding: 0;
            border-radius: 0;
        }

        /* ===== Article List ===== */
        .article-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .article-card {
            display: block;
            text-decoration: none;
            color: inherit;
        }

        .article-card h3 {
            margin-top: 0;
            margin-bottom: 0.25rem;
            color: var(--text);
            font-size: 1.15rem;
        }

        .article-card .date {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .article-card .summary {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.7;
        }

        .read-more {
            display: inline-block;
            margin-top: 0.5rem;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--accent);
        }

        .article-card:hover .read-more {
            text-decoration: underline;
        }

        /* ===== Page Content ===== */
        .page-header {
            margin-bottom: 2rem;
        }

        .page-header .subtitle {
            color: var(--text-secondary);
            font-size: 1.05rem;
            margin-top: 0.25rem;
        }

        .content-body {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem 2.25rem;
            box-shadow: var(--shadow);
            font-size: 1rem;
            line-height: 1.85;
        }

        .content-body h2:first-child {
            margin-top: 0;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 500;
            text-decoration: none;
            margin-top: 1.5rem;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: var(--accent);
            text-decoration: none;
        }

        .content-date {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        /* ===== Hero Section ===== */
        .hero {
            text-align: center;
            padding: 2rem 0 1rem;
        }

        .hero h1 {
            font-size: 2.25rem;
        }

        .hero .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-top: 0.5rem;
        }

        /* ===== Responsive ===== */
        @media (max-width: 640px) {
            .header-inner {
                padding: 0 1rem;
            }

            main {
                padding: 1.5rem 1rem 3rem;
            }

            h1 {
                font-size: 1.6rem;
            }

            .content-body {
                padding: 1.25rem 1.25rem;
            }

            .hero h1 {
                font-size: 1.75rem;
            }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header>
        <div class="header-inner">
            <a href="/" class="logo">
                <span class="logo-icon">跨</span>
                跨越晨昏
            </a>
            <nav>
                <a href="/">首页</a>
                <a href="/md">文章</a>
                <a href="/wikidot">Wiki</a>
                <a href="/about">关于</a>
                <a href="/admin" style="color: var(--accent);">管理</a>
                <button class="sidebar-toggle" onclick="toggleSidebar()" title="标签" aria-label="打开标签侧栏">🏷️</button>
            </nav>
        </div>
    </header>

    <!-- 侧栏遮罩 -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <!-- 侧栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3>🏷️ 标签</h3>
            <button class="sidebar-close" onclick="toggleSidebar()" aria-label="关闭侧栏">✕</button>
        </div>
        <div class="sidebar-body" id="sidebarTags">
            <p style="color: var(--text-muted); font-size: 0.9rem;">加载中...</p>
        </div>
        <div class="sidebar-footer">
            <a href="/labels">查看所有标签 →</a>
        </div>
    </aside>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 跨越晨昏 · 使用 <a href="https://lihil.cc" target="_blank">LiHiL</a> 构建</p>
        <p><a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer" style="color: var(--text-muted); text-decoration: none; font-size: 0.85rem;">京ICP备2026033372号</a></p>
    </footer>

    {% block extra_scripts %}{% endblock %}
    <script>
        // ── 侧栏控制 ──
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const isOpen = sidebar.classList.contains('open');
            if (isOpen) {
                sidebar.classList.remove('open');
                overlay.classList.remove('open');
            } else {
                sidebar.classList.add('open');
                overlay.classList.add('open');
                loadSidebarTags();
            }
        }

        async function loadSidebarTags() {
            const container = document.getElementById('sidebarTags');
            if (container.dataset.loaded === 'true') return;
            try {
                const resp = await fetch('/labels');
                const text = await resp.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(text, 'text/html');
                const tagLinks = doc.querySelectorAll('.tag-item');
                let html = '';
                tagLinks.forEach(link => {
                    const name = link.querySelector('.tag-name').textContent;
                    const count = link.querySelector('.tag-count').textContent;
                    html += `<a href="${link.href}" class="sidebar-tag">${name}<span class="count">(${count})</span></a>`;
                });
                if (!html) {
                    html = '<p style="color: var(--text-muted); font-size: 0.9rem;">暂无标签</p>';
                }
                container.innerHTML = html;
                container.dataset.loaded = 'true';
            } catch (e) {
                container.innerHTML = '<p style="color: var(--text-muted); font-size: 0.9rem;">加载失败</p>';
            }
        }
    </script>
</body>
</html>
