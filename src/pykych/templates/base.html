<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title | default('PyKYCH') }}</title>
    <style>
        /* ===== CSS Reset & Base ===== */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #fdfcf9;
            --bg-card: #ffffff;
            --text: #2c2c2c;
            --text-secondary: #6b6b6b;
            --text-muted: #999;
            --border: #e8e5df;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --code-bg: #f5f4f0;
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.05), 0 2px 4px rgba(0, 0, 0, 0.04);
            --radius: 8px;
            --max-width: 720px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ===== Header ===== */
        header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 1.2rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
            background: rgba(253, 252, 249, 0.92);
        }

        .header-inner {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            font-size: 1rem;
        }

        nav {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        nav a:hover {
            color: var(--accent);
        }

        /* ===== Main Content ===== */
        main {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
        }

        /* ===== Footer ===== */
        footer {
            text-align: center;
            padding: 2rem 1.5rem;
            color: var(--text-muted);
            font-size: 0.875rem;
            border-top: 1px solid var(--border);
            max-width: var(--max-width);
            margin: 0 auto;
        }

        /* ===== Card ===== */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem 1.75rem;
            box-shadow: var(--shadow);
            transition: box-shadow 0.2s ease, transform 0.2s ease;
        }

        .card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }

        /* ===== Typography ===== */
        h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.3;
            margin-bottom: 0.5rem;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-top: 2rem;
            margin-bottom: 0.75rem;
            letter-spacing: -0.02em;
        }

        h3 {
            font-size: 1.15rem;
            font-weight: 600;
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
        }

        p {
            margin-bottom: 1rem;
        }

        a {
            color: var(--accent);
            text-decoration: none;
        }

        a:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }

        ul, ol {
            margin-bottom: 1rem;
            padding-left: 1.5rem;
        }

        li {
            margin-bottom: 0.4rem;
        }

        strong {
            font-weight: 600;
        }

        pre {
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem 1.25rem;
            overflow-x: auto;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            line-height: 1.6;
        }

        code {
            font-family: "SF Mono", "Fira Code", "Fira Mono", "Cascadia Code", monospace;
            font-size: 0.875rem;
            background: var(--code-bg);
            padding: 0.15em 0.35em;
            border-radius: 4px;
        }

        pre code {
            background: none;
            padding: 0;
            border-radius: 0;
        }

        /* ===== Article List ===== */
        .article-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .article-card {
            display: block;
            text-decoration: none;
            color: inherit;
        }

        .article-card h3 {
            margin-top: 0;
            margin-bottom: 0.25rem;
            color: var(--text);
            font-size: 1.15rem;
        }

        .article-card .date {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .article-card .summary {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.7;
        }

        .read-more {
            display: inline-block;
            margin-top: 0.5rem;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--accent);
        }

        .article-card:hover .read-more {
            text-decoration: underline;
        }

        /* ===== Page Content ===== */
        .page-header {
            margin-bottom: 2rem;
        }

        .page-header .subtitle {
            color: var(--text-secondary);
            font-size: 1.05rem;
            margin-top: 0.25rem;
        }

        .content-body {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem 2.25rem;
            box-shadow: var(--shadow);
            font-size: 1rem;
            line-height: 1.85;
        }

        .content-body h2:first-child {
            margin-top: 0;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 500;
            text-decoration: none;
            margin-top: 1.5rem;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: var(--accent);
            text-decoration: none;
        }

        .content-date {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        /* ===== Hero Section ===== */
        .hero {
            text-align: center;
            padding: 2rem 0 1rem;
        }

        .hero h1 {
            font-size: 2.25rem;
        }

        .hero .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-top: 0.5rem;
        }

        /* ===== Responsive ===== */
        @media (max-width: 640px) {
            .header-inner {
                padding: 0 1rem;
            }

            main {
                padding: 1.5rem 1rem 3rem;
            }

            h1 {
                font-size: 1.6rem;
            }

            .content-body {
                padding: 1.25rem 1.25rem;
            }

            .hero h1 {
                font-size: 1.75rem;
            }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header>
        <div class="header-inner">
            <a href="/" class="logo">
                <span class="logo-icon">P</span>
                PyKYCH
            </a>
            <nav>
                <a href="/">首页</a>
                <a href="/about">关于</a>
            </nav>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 PyKYCH · 使用 <a href="https://lihil.cc" target="_blank">LiHiL</a> 构建</p>
    </footer>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
