{% extends "base.html" %}

{% block extra_head %}
<style>
    .form-container {
        max-width: 780px;
    }
    .form-group {
        margin-bottom: 1.25rem;
    }
    .form-group label {
        display: block;
        font-weight: 600;
        font-size: 0.9rem;
        margin-bottom: 0.35rem;
        color: var(--text);
    }
    .form-group .hint {
        font-size: 0.8rem;
        color: var(--text-muted);
        font-weight: 400;
    }
    .form-input {
        width: 100%;
        padding: 0.6rem 0.85rem;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        font-size: 0.95rem;
        font-family: inherit;
        background: var(--bg-card);
        color: var(--text);
        transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
    }
    .form-input.mono {
        font-family: "SF Mono", "Fira Code", monospace;
        font-size: 0.85rem;
    }
    textarea.form-input {
        min-height: 360px;
        line-height: 1.65;
        resize: vertical;
    }
    .form-actions {
        display: flex;
        gap: 0.75rem;
        align-items: center;
        margin-top: 1.5rem;
        padding-top: 1.25rem;
        border-top: 1px solid var(--border);
    }
    .btn {
        display: inline-block;
        padding: 0.55rem 1.25rem;
        border-radius: var(--radius);
        font-size: 0.92rem;
        font-weight: 500;
        cursor: pointer;
        border: 1px solid transparent;
        text-decoration: none;
        transition: all 0.2s;
    }
    .btn-primary {
        background: var(--accent);
        color: #fff;
    }
    .btn-primary:hover {
        background: var(--accent-hover);
        color: #fff;
    }
    .btn-cancel {
        background: transparent;
        border-color: var(--border);
        color: var(--text-secondary);
    }
    .btn-cancel:hover {
        color: var(--accent);
        border-color: var(--accent);
        text-decoration: none;
    }
    .error-msg {
        background: #fef2f2;
        border: 1px solid #fecaca;
        color: #dc2626;
        padding: 0.75rem 1rem;
        border-radius: var(--radius);
        margin-bottom: 1.25rem;
        font-size: 0.9rem;
    }
    [data-theme="dark"] .error-msg {
        background: rgba(220, 38, 38, 0.12);
        border-color: rgba(220, 38, 38, 0.25);
        color: #f87171;
    }
    .preview-hint {
        font-size: 0.82rem;
        color: var(--text-muted);
        margin-top: 0.35rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="page-header form-container">
    <h1>{{ form_title }}</h1>
</div>

<div class="form-container">
    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ action }}">
        <div class="form-group">
            <label for="title">标题</label>
            <input type="text" id="title" name="title" class="form-input"
                   value="{{ article.title if article else '' }}"
                   placeholder="输入文章标题" required autofocus>
        </div>

        <div class="form-group">
            <label for="slug">
                Slug
                <span class="hint">— URL 标识，例如: my-article</span>
            </label>
            <input type="text" id="slug" name="slug" class="form-input mono"
                   value="{{ article.slug if article else '' }}"
                   placeholder="my-article-slug"
                   {% if article and article.slug %}readonly{% endif %}
                   required>
            {% if article and article.slug %}
            <p class="preview-hint">Slug 创建后不可修改</p>
            {% endif %}
        </div>

        <div class="form-group">
            <label for="content">
                内容
                {% if article_type == 'md' %}
                <span class="hint">— Markdown 语法</span>
                {% elif article_type == 'wikidot' %}
                <span class="hint">— Wikidot 语法</span>
                {% elif article_type == 'html' %}
                <span class="hint">— 原生 HTML</span>
                {% elif article_type == 'bbcode' %}
                <span class="hint">— BBCode 语法</span>
                {% endif %}
            </label>
            <textarea id="content" name="content" class="form-input mono"
                      placeholder="在此编写内容..." required>{{ article.content if article else '' }}</textarea>
        </div>

        <div class="form-group">
            <label for="tagInput">
                🏷️ 标签管理
                <span class="hint">— 添加或移除文章标签，按回车添加新标签</span>
            </label>
            <!-- 隐藏字段存储逗号分隔的标签值 -->
            <input type="hidden" id="tags" name="tags" value="{{ article._tag_str if article and article._tag_str else '' }}">
            <!-- 标签展示区 -->
            <div id="tagContainer" style="display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.5rem; min-height: 2rem; padding: 0.35rem 0;">
            </div>
            <!-- 添加标签输入 -->
            <div style="display: flex; gap: 0.4rem;">
                <input type="text" id="tagInput" class="form-input" style="flex: 1;"
                       placeholder="输入标签名称，按回车添加..." autocomplete="off">
                <button type="button" id="addTagBtn" class="btn btn-primary" style="white-space: nowrap;">+ 添加</button>
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">💾 保存</button>
            <a href="/admin" class="btn btn-cancel">取消</a>
        </div>
    </form>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
(function() {
    const hiddenInput = document.getElementById('tags');
    const container = document.getElementById('tagContainer');
    const tagInput = document.getElementById('tagInput');
    const addBtn = document.getElementById('addTagBtn');

    // 从隐藏字段读取已有标签
    function getTags() {
        const val = hiddenInput.value.trim();
        if (!val) return [];
        return val.split(',').map(t => t.trim()).filter(t => t);
    }

    // 更新隐藏字段
    function setTags(tags) {
        hiddenInput.value = tags.join(', ');
    }

    // 渲染标签
    function renderTags() {
        const tags = getTags();
        container.innerHTML = '';
        tags.forEach(tag => {
            const badge = document.createElement('span');
            badge.className = 'tag-badge';
            badge.style.cssText = 'display: inline-flex; align-items: center; gap: 0.2rem; padding: 0.25rem 0.6rem; background: var(--code-bg); border: 1px solid var(--border); border-radius: 1rem; font-size: 0.85rem; color: var(--text-secondary);';
            badge.innerHTML = '<span>#' + escapeHtml(tag) + '</span>' +
                '<span class="tag-remove" data-tag="' + escapeHtml(tag) + '" style="cursor: pointer; font-size: 1rem; line-height: 1; color: var(--text-muted); padding: 0 0.15rem;" title="移除标签">&times;</span>';
            container.appendChild(badge);
        });

        // 绑定移除事件
        container.querySelectorAll('.tag-remove').forEach(el => {
            el.addEventListener('click', function() {
                const tag = this.dataset.tag;
                const tags = getTags().filter(t => t !== tag);
                setTags(tags);
                renderTags();
            });
            el.addEventListener('mouseenter', function() {
                this.style.color = '#dc2626';
            });
            el.addEventListener('mouseleave', function() {
                this.style.color = 'var(--text-muted)';
            });
        });
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    // 添加标签
    function addTag(name) {
        name = name.trim().toLowerCase();
        if (!name) return;
        name = name.replace(/,/g, '');
        if (!name) return;
        const tags = getTags();
        if (tags.includes(name)) {
            tagInput.value = '';
            return;
        }
        tags.push(name);
        setTags(tags);
        renderTags();
        tagInput.value = '';
        tagInput.focus();
    }

    // 初始化
    renderTags();

    // 事件监听
    tagInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            addTag(tagInput.value);
        }
    });

    addBtn.addEventListener('click', function() {
        addTag(tagInput.value);
    });

    // 表单提交前同步
    document.querySelector('form').addEventListener('submit', function() {
        setTags(getTags());
    });
})();
</script>
{% endblock %}
