{% extends "admin_base.html" %}

{% block content %}
<div class="wp-card" style="max-width:860px;">
    <div class="wp-card-header">
        <h2>{{ form_title }}</h2>
        <a href="/admin" class="wp-btn wp-btn-secondary wp-btn-sm">← 返回</a>
    </div>
    <div class="wp-card-body">
        {% if error %}
        <div class="wp-notice wp-notice-error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ action }}">
            <div class="wp-form-group">
                <label for="title">标题</label>
                <input type="text" id="title" name="title" class="wp-form-input"
                       value="{{ article.title if article else '' }}"
                       placeholder="输入文章标题" required autofocus>
            </div>

            <div class="wp-form-group">
                <label for="slug">
                    Slug
                    <span class="wp-hint">— URL 标识，例如: my-article</span>
                </label>
                <input type="text" id="slug" name="article_slug" class="wp-form-input mono"
                       value="{{ article.slug if article else '' }}"
                       placeholder="my-article-slug"
                       {% if article and article.slug %}readonly{% endif %}
                       required>
                {% if article and article.slug %}
                <p class="wp-hint" style="margin-top:0.25rem;">Slug 创建后不可修改</p>
                {% endif %}
            </div>

            <div class="wp-form-group">
                <label for="content">
                    内容
                    {% if article_type == 'md' %}
                    <span class="wp-hint">— Markdown 语法</span>
                    {% elif article_type == 'wikidot' %}
                    <span class="wp-hint">— Wikidot 语法</span>
                    {% elif article_type == 'html' %}
                    <span class="wp-hint">— 原生 HTML</span>
                    {% elif article_type == 'bbcode' %}
                    <span class="wp-hint">— BBCode 语法</span>
                    {% endif %}
                </label>
                <textarea id="content" name="content" class="wp-form-input mono"
                          placeholder="在此编写内容..." required>{{ article.content if article else '' }}</textarea>
            </div>

            <div class="wp-form-group">
                <label for="tagInput">
                    🏷️ 标签管理
                    <span class="wp-hint">— 添加或移除文章标签，按回车添加新标签</span>
                </label>
                <input type="hidden" id="tags" name="tags" value="{{ article._tag_str if article and article._tag_str else '' }}">
                <div id="tagContainer" style="display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.5rem; min-height: 2rem; padding: 0.35rem 0;">
                </div>
                <div style="display: flex; gap: 0.4rem;">
                    <input type="text" id="tagInput" class="wp-form-input" style="flex: 1;"
                           placeholder="输入标签名称，按回车添加..." autocomplete="off">
                    <button type="button" id="addTagBtn" class="wp-btn wp-btn-primary" style="white-space: nowrap;">+ 添加</button>
                </div>
            </div>

            <div class="wp-form-actions">
                <button type="submit" class="wp-btn wp-btn-primary">💾 保存</button>
                <a href="/admin" class="wp-btn wp-btn-secondary">取消</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
(function() {
    const hiddenInput = document.getElementById('tags');
    const container = document.getElementById('tagContainer');
    const tagInput = document.getElementById('tagInput');
    const addBtn = document.getElementById('addTagBtn');

    // 从隐藏字段读取已有标签
    function getTags() {
        const val = hiddenInput.value.trim();
        if (!val) return [];
        return val.split(',').map(t => t.trim()).filter(t => t);
    }

    // 更新隐藏字段
    function setTags(tags) {
        hiddenInput.value = tags.join(', ');
    }

    // 渲染标签
    function renderTags() {
        const tags = getTags();
        container.innerHTML = '';
        tags.forEach(tag => {
            const badge = document.createElement('span');
            badge.className = 'tag-badge';
            badge.style.cssText = 'display: inline-flex; align-items: center; gap: 0.2rem; padding: 0.25rem 0.6rem; background: var(--code-bg); border: 1px solid var(--border); border-radius: 1rem; font-size: 0.85rem; color: var(--text-secondary);';
            badge.innerHTML = '<span>#' + escapeHtml(tag) + '</span>' +
                '<span class="tag-remove" data-tag="' + escapeHtml(tag) + '" style="cursor: pointer; font-size: 1rem; line-height: 1; color: var(--text-muted); padding: 0 0.15rem;" title="移除标签">&times;</span>';
            container.appendChild(badge);
        });

        // 绑定移除事件
        container.querySelectorAll('.tag-remove').forEach(el => {
            el.addEventListener('click', function() {
                const tag = this.dataset.tag;
                const tags = getTags().filter(t => t !== tag);
                setTags(tags);
                renderTags();
            });
            el.addEventListener('mouseenter', function() {
                this.style.color = '#dc2626';
            });
            el.addEventListener('mouseleave', function() {
                this.style.color = 'var(--text-muted)';
            });
        });
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    // 添加标签
    function addTag(name) {
        name = name.trim().toLowerCase();
        if (!name) return;
        name = name.replace(/,/g, '');
        if (!name) return;
        const tags = getTags();
        if (tags.includes(name)) {
            tagInput.value = '';
            return;
        }
        tags.push(name);
        setTags(tags);
        renderTags();
        tagInput.value = '';
        tagInput.focus();
    }

    // 初始化
    renderTags();

    // 事件监听
    tagInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            addTag(tagInput.value);
        }
    });

    addBtn.addEventListener('click', function() {
        addTag(tagInput.value);
    });

    // 表单提交前同步
    document.querySelector('form').addEventListener('submit', function() {
        setTags(getTags());
    });
})();
</script>
{% endblock %}
