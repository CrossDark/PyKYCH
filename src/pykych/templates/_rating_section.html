<!-- 评分区域 — 在评论区之前显示 -->
<section class="rating-section" data-article-type="{{ article_type }}" data-article-slug="{{ article_slug }}" style="margin: 2rem 0; padding: 1.25rem 1.5rem; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);">
    <!-- 第一行：最终评分 + 滑块 -->
    <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem;">
        <div style="display: flex; align-items: center; gap: 0.5rem;">
            <span style="font-weight: 600; font-size: 1rem;">⭐ 评分</span>
        </div>
        <div class="rating-slider-container" style="display: flex; align-items: center; gap: 0.75rem;">
            <span style="font-size: 0.85rem; color: var(--text-muted);">-1</span>
            <input type="range" class="rating-slider" min="-1" max="1" step="0.1" value="0"
                style="width: 160px; accent-color: var(--accent); cursor: pointer;">
            <span style="font-size: 0.85rem; color: var(--text-muted);">+1</span>
            <span class="rating-current-value" style="font-weight: 600; font-size: 0.95rem; min-width: 2rem; text-align: center;">0.0</span>
        </div>
    </div>

    <!-- 第二行：你的评分 + 最终评分 + 详细评分按钮 -->
    <div style="display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 1.5rem; margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px dashed var(--border);">
        <!-- 你的评分 -->
        <div class="rating-user-score" style="display: flex; align-items: center; gap: 0.4rem; font-size: 0.9rem;">
            <span style="color: var(--text-muted);">你的评分：</span>
            <span class="rating-user-value" style="font-weight: 600; color: var(--accent);">--</span>
            <button class="rating-undo-btn" title="撤销评分" style="display: none; font-size: 0.75rem; padding: 0.15rem 0.5rem; border: 1px solid var(--border); border-radius: 3px; background: var(--bg); color: var(--text-muted); cursor: pointer; transition: all 0.2s;"
                onmouseover="this.style.color='#ef4444';this.style.borderColor='#ef4444';"
                onmouseout="this.style.color='var(--text-muted)';this.style.borderColor='var(--border)';">✕ 撤销</button>
        </div>
        <!-- 最终评分 -->
        <div style="display: flex; align-items: center; gap: 0.4rem;">
            <span style="font-weight: 600; font-size: 0.9rem;">最终评分：</span>
            <span class="rating-avg" style="font-size: 1.3rem; font-weight: 700; color: var(--accent);">
                {% if rating %}{{ "%.1f"|format(rating.average_score) }}{% else %}0.0{% endif %}
            </span>
            <span class="rating-count" style="color: var(--text-muted); font-size: 0.85rem;">
                （{% if rating %}{{ rating.total_voters }}{% else %}0{% endif %} 人评分）
            </span>
        </div>
        <!-- 详细评分按钮 -->
        <button class="rating-detail-btn" style="font-size: 0.85rem; padding: 0.35rem 0.85rem; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text); cursor: pointer; transition: all 0.2s;"
            onmouseover="this.style.background='var(--accent)';this.style.color='#fff';this.style.borderColor='var(--accent)';"
            onmouseout="this.style.background='var(--bg)';this.style.color='var(--text)';this.style.borderColor='var(--border)';">
            📋 详细评分
        </button>
    </div>

    <div class="rating-message" style="margin-top: 0.5rem; font-size: 0.85rem; color: var(--text-muted); text-align: center; display: none;"></div>

    <!-- 详细评分弹窗 -->
    <div class="rating-detail-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; align-items: center; justify-content: center;">
        <div style="background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; max-width: 480px; width: 90%; max-height: 70vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.2);">
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem;">
                <h3 style="margin: 0; font-size: 1.1rem;">📋 详细评分记录</h3>
                <button class="rating-detail-close" style="background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-muted); line-height: 1; padding: 0 0.25rem;">&times;</button>
            </div>
            <div class="rating-detail-content" style="font-size: 0.9rem;">
                <div style="text-align: center; padding: 2rem; color: var(--text-muted);">加载中...</div>
            </div>
        </div>
    </div>
</section>

<script>
(function() {
    const section = document.currentScript.parentElement.querySelector('.rating-section');
    if (!section) return;

    const articleType = section.dataset.articleType;
    const articleSlug = section.dataset.articleSlug;
    const slider = section.querySelector('.rating-slider');
    const avgEl = section.querySelector('.rating-avg');
    const countEl = section.querySelector('.rating-count');
    const valueEl = section.querySelector('.rating-current-value');
    const userValueEl = section.querySelector('.rating-user-value');
    const msgEl = section.querySelector('.rating-message');
    const detailBtn = section.querySelector('.rating-detail-btn');
    const detailModal = section.querySelector('.rating-detail-modal');
    const detailClose = section.querySelector('.rating-detail-close');
    const detailContent = section.querySelector('.rating-detail-content');
    const undoBtn = section.querySelector('.rating-undo-btn');

    // 从服务器加载当前评分状态
    async function loadRating() {
        try {
            const resp = await fetch(`/api/ratings/${articleType}/${articleSlug}`);
            const data = await resp.json();
            avgEl.textContent = data.average_score.toFixed(1);
            countEl.textContent = `（${data.total_voters} 人评分）`;
            if (data.user_score !== null && data.user_score !== undefined) {
                slider.value = data.user_score;
                valueEl.textContent = data.user_score.toFixed(1);
                userValueEl.textContent = data.user_score.toFixed(1);
                undoBtn.style.display = 'inline-block';
            } else {
                slider.value = 0;
                valueEl.textContent = '0.0';
                userValueEl.textContent = '--';
                undoBtn.style.display = 'none';
            }
        } catch (e) {
            console.error('加载评分失败:', e);
        }
    }

    // 加载详细评分
    async function loadDetailRatings() {
        detailContent.innerHTML = '<div style="text-align: center; padding: 2rem; color: var(--text-muted);">加载中...</div>';
        try {
            const resp = await fetch(`/api/ratings/${articleType}/${articleSlug}/details`);
            const data = await resp.json();
            if (!data.ratings || data.ratings.length === 0) {
                detailContent.innerHTML = '<div style="text-align: center; padding: 2rem; color: var(--text-muted);">暂无评分记录</div>';
                return;
            }
            let html = '<table style="width: 100%; border-collapse: collapse;">';
            html += '<thead><tr style="border-bottom: 2px solid var(--border);">';
            html += '<th style="text-align: left; padding: 0.5rem 0.75rem; font-size: 0.85rem; color: var(--text-muted);">用户</th>';
            html += '<th style="text-align: center; padding: 0.5rem 0.75rem; font-size: 0.85rem; color: var(--text-muted);">评分</th>';
            html += '<th style="text-align: right; padding: 0.5rem 0.75rem; font-size: 0.85rem; color: var(--text-muted);">时间</th>';
            html += '</tr></thead><tbody>';
            data.ratings.forEach(function(r) {
                var scoreClass = r.score > 0 ? 'color: #10b981;' : (r.score < 0 ? 'color: #ef4444;' : 'color: var(--text-muted);');
                var scoreSign = r.score > 0 ? '+' : '';
                var timeStr = r.created_at ? r.created_at.substring(0, 16).replace('T', ' ') : '';
                html += '<tr style="border-bottom: 1px solid var(--border);">';
                html += '<td style="padding: 0.5rem 0.75rem; font-weight: 500;">' + escapeHtml(r.author_name) + '</td>';
                html += '<td style="padding: 0.5rem 0.75rem; text-align: center; font-weight: 700; ' + scoreClass + '">' + scoreSign + r.score.toFixed(1) + '</td>';
                html += '<td style="padding: 0.5rem 0.75rem; text-align: right; font-size: 0.8rem; color: var(--text-muted);">' + timeStr + '</td>';
                html += '</tr>';
            });
            html += '</tbody></table>';
            detailContent.innerHTML = html;
        } catch (e) {
            detailContent.innerHTML = '<div style="text-align: center; padding: 2rem; color: #ef4444;">加载失败，请重试</div>';
        }
    }

    function escapeHtml(text) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(text));
        return div.innerHTML;
    }

    // 打开详细评分弹窗
    detailBtn.addEventListener('click', function() {
        detailModal.style.display = 'flex';
        loadDetailRatings();
    });

    // 关闭弹窗
    detailClose.addEventListener('click', function() {
        detailModal.style.display = 'none';
    });
    detailModal.addEventListener('click', function(e) {
        if (e.target === detailModal) {
            detailModal.style.display = 'none';
        }
    });

    // ESC 关闭弹窗
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && detailModal.style.display === 'flex') {
            detailModal.style.display = 'none';
        }
    });

    // 滑块变化时更新显示值
    slider.addEventListener('input', function() {
        valueEl.textContent = parseFloat(this.value).toFixed(1);
    });

    // 滑块松开时提交评分
    slider.addEventListener('change', async function() {
        const score = parseFloat(this.value);
        msgEl.style.display = 'block';
        msgEl.textContent = '提交中...';
        msgEl.style.color = 'var(--text-muted)';

        try {
            const resp = await fetch(`/api/ratings/${articleType}/${articleSlug}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ score: score })
            });
            if (resp.status === 401) {
                msgEl.textContent = '请先登录后再评分';
                msgEl.style.color = '#f59e0b';
                loadRating();
                return;
            }
            const data = await resp.json();
            if (data.error) {
                msgEl.textContent = data.error;
                msgEl.style.color = '#ef4444';
                return;
            }
            avgEl.textContent = data.average_score.toFixed(1);
            countEl.textContent = `（${data.total_voters} 人评分）`;
            slider.value = data.user_score;
            valueEl.textContent = data.user_score.toFixed(1);
            userValueEl.textContent = data.user_score.toFixed(1);
            undoBtn.style.display = 'inline-block';
            msgEl.textContent = '评分成功！';
            msgEl.style.color = '#10b981';
            setTimeout(() => { msgEl.style.display = 'none'; }, 2000);
        } catch (e) {
            msgEl.textContent = '网络错误，请重试';
            msgEl.style.color = '#ef4444';
        }
    });

    // 撤销评分按钮
    undoBtn.addEventListener('click', async function() {
        if (!confirm('确定要撤销你的评分吗？')) return;

        msgEl.style.display = 'block';
        msgEl.textContent = '撤销中...';
        msgEl.style.color = 'var(--text-muted)';

        try {
            const resp = await fetch(`/api/ratings/${articleType}/${articleSlug}`, {
                method: 'DELETE'
            });
            if (resp.status === 401) {
                msgEl.textContent = '请先登录后再操作';
                msgEl.style.color = '#f59e0b';
                return;
            }
            const data = await resp.json();
            if (data.error) {
                msgEl.textContent = data.error;
                msgEl.style.color = '#ef4444';
                return;
            }
            avgEl.textContent = data.average_score.toFixed(1);
            countEl.textContent = `（${data.total_voters} 人评分）`;
            slider.value = 0;
            valueEl.textContent = '0.0';
            userValueEl.textContent = '--';
            undoBtn.style.display = 'none';
            msgEl.textContent = '评分已撤销';
            msgEl.style.color = '#10b981';
            setTimeout(() => { msgEl.style.display = 'none'; }, 2000);
        } catch (e) {
            msgEl.textContent = '网络错误，请重试';
            msgEl.style.color = '#ef4444';
        }
    });

    loadRating();
})();
</script>
