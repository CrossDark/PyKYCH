{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <h1>{{ page_title or site_name }}</h1>
    {% if site_name %}
    <p class="subtitle" style="font-size: 0.85rem; color: var(--text-muted);">
        来自外部站点 · {{ site_name }}
        {% if fetched_at %}
        · 缓存于 {{ fetched_at[:19] }}
        {% endif %}
    </p>
    {% endif %}
</div>

<div class="content-body">
    {{ html_content | safe }}
</div>

<a href="/html" class="back-link">← 返回 HTML 列表</a>
{% endblock %}
